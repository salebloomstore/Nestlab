version: "3.9"

networks:
  nest-cluster:
    external: true

services:

  # =========================
  # NUXT SSR
  # =========================
  nuxt-app:
    container_name: fe-nuxt-app

    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    environment:
      HOST: 0.0.0.0
      PORT: 4000
      NODE_ENV: production

    ports:
      - "4000:4000"

    volumes:
      - ./app:/app

    networks:
      - nest-cluster


  # =========================
  # NGINX
  # =========================
  nginx:
    container_name: fe-nginx

    image: nginx:alpine

    restart: unless-stopped

    depends_on:
      - nuxt-app

    ports:
      - "90:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    networks:
      - nest-cluster
