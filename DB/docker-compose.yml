  # =========================
  # MONGOS ROUTER
  # =========================
  mongo-router:
    container_name: ${APP_NAME}_mongo-router
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - ./keyfile:/etc
      - ./mongo/cluster.js:/mongo/cluster.js:ro
    command: |
      bash -c "
      echo 'Waiting for replica set initialization...'

      echo '⏳ Waiting for CONFIG-SERVER (cfgRS)...'
      until mongosh --quiet 'mongodb://${MONGO_ADMIN_CONFIG_SV}:${MONGO_PASSWORD_CONFIG_SV}@config-sv-primary:27017/admin' --eval 'rs.status().ok' | grep 1 > /dev/null; do
        sleep 1
      done
      until mongosh --quiet 'mongodb://${MONGO_ADMIN_CONFIG_SV}:${MONGO_PASSWORD_CONFIG_SV}@config-sv-assistant:27017/admin' --eval 'rs.status().ok' | grep 1 > /dev/null; do
        sleep 1
      done
      until mongosh --quiet 'mongodb://${MONGO_ADMIN_CONFIG_SV}:${MONGO_PASSWORD_CONFIG_SV}@config-sv-secretary:27017/admin' --eval 'rs.status().ok' | grep 1 > /dev/null; do
        sleep 1
      done
      echo '✅ CONFIG-SERVER READY'

      echo '⏳ Waiting for SHARD-DN (dnRS)...'
      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_DN}:${MONGO_PASSWORD_SHARD_DN}@shard-dn-primary:27017/admin' --eval 'rs.status().ok' | grep 1 > /dev/null; do
        sleep 1
      done
      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_DN}:${MONGO_PASSWORD_SHARD_DN}@shard-dn-assistant:27017/admin' --eval 'rs.status().ok' | grep 1 > /dev/null; do
        sleep 1
      done
      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_DN}:${MONGO_PASSWORD_SHARD_DN}@shard-dn-secretary:27017/admin' --eval 'rs.status().ok' | grep 1 > /dev/null; do
        sleep 1
      done
      echo '✅ SHARD-DN READY'

      echo '⏳ Waiting for SHARD-HN (hnRS)...'
      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_HN}:${MONGO_PASSWORD_SHARD_HN}@shard-hn-primary:27017/admin' --eval 'rs.status().ok' | grep 1 > /dev/null; do
        sleep 1
      done
      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_HN}:${MONGO_PASSWORD_SHARD_HN}@shard-hn-assistant:27017/admin' --eval 'rs.status().ok' | grep 1 > /dev/null; do
        sleep 1
      done
      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_HN}:${MONGO_PASSWORD_SHARD_HN}@shard-hn-secretary:27017/admin' --eval 'rs.status().ok' | grep 1 > /dev/null; do
        sleep 1
      done
      echo '✅ SHARD-HN READY'

      echo '⏳ Waiting for SHARD-SG (sgRS)...'
      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_SG}:${MONGO_PASSWORD_SHARD_SG}@shard-sg-primary:27017/admin' --eval 'rs.status().ok' | grep 1 > /dev/null; do
        sleep 1
      done
      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_SG}:${MONGO_PASSWORD_SHARD_SG}@shard-sg-assistant:27017/admin' --eval 'rs.status().ok' | grep 1 > /dev/null; do
        sleep 1
      done
      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_SG}:${MONGO_PASSWORD_SHARD_SG}@shard-sg-secretary:27017/admin' --eval 'rs.status().ok' | grep 1 > /dev/null; do
        sleep 1
      done
      echo '✅ SHARD-SG READY'

      echo '🎉 ALL REPLICA SETS INITIALIZED'
      mongos --configdb cfgRS/config-sv-primary:27017,config-sv-assistant:27017,config-sv-secretary:27017 --bind_ip_all --keyFile /etc/mongo-keyfile --fork --logpath /tmp/mongos.log
      echo 'Waiting for mongos startup...'
      until mongosh --quiet --host mongo-router --port 27017 -u ${MONGO_ADMIN_CONFIG_SV} -p ${MONGO_PASSWORD_CONFIG_SV} --authenticationDatabase admin --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 1
      done
      echo 'mongos is ready'
      mongosh --host mongo-router --port 27017 -u ${MONGO_ADMIN_CONFIG_SV} -p ${MONGO_PASSWORD_CONFIG_SV} --authenticationDatabase admin /mongo/cluster.js && tail -f /tmp/mongos.log
      "
    networks:
      - nest-cluster

  # =========================
  # MONGO EXPRESS
  # =========================
  mongo-express:
    container_name: ${APP_NAME}_mongo-express
    image: mongo-express
    depends_on:
      - mongo-router
    env_file:
      - .env
    ports:
      - "8081:8081"
    restart: always
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${EXPRESS_ADMIN}:${EXPRESS_PASSWORD}@mongo-router:27017/admin?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: ${EXPRESS_ADMIN}
      ME_CONFIG_BASICAUTH_PASSWORD: ${EXPRESS_PASSWORD}
    command: |
      bash -c "
      echo 'Waiting for mongos startup...'
      until nc -z mongo-router 27017; do
        sleep 1
      done
      echo 'mongos is ready'
      /sbin/tini -- node app
      "
    networks:
      - nest-cluster
