version: "3.9"

networks:
  nest-cluster:
    driver: bridge

services:

  # =========================
  # KEYFILE GENERATOR
  # =========================
  keygen:
    container_name: ${APP_NAME}_keygen
    image: mongo:7
    volumes:
      - ./keyfile:/keyfile
      - ./init/keygen:/keygen
    entrypoint: ["bash", "/keygen/create-keyfile.sh"]

  # =========================
  # CONFIG SERVERS (3 nodes)
  # =========================
  config-sv-primary:
    container_name: ${APP_NAME}_config-sv-primary
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - ./keyfile:/etc
      - ./init/init-config-sv/init-config-sv-primary.js:/init/init.js:ro
      - ./data/config-sv/config-sv-primary:/data/db
    env_file:
      - .env
    command: |
      bash -c "
      until [ -f /etc/mongo-keyfile ]; do
        echo 'Waiting for mongo-keyfile...'
        sleep 1
      done
      mongod --replSet cfgRS --bind_ip_all --configsvr --port 27017 --fork --logpath /tmp/mongod.log
      echo 'Waiting for MongoDB startup...'
      while ! mongosh --quiet --host config-sv-primary:27017 --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 1
      done
      while ! mongosh --quiet --host config-sv-assistant:27017 --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 1
      done
      while ! mongosh --quiet --host config-sv-secretary:27017 --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 1
      done
      echo 'MongoDB is ready'
      mongosh --host config-sv-primary:27017 /init/init.js
      kill -15 $(pidof mongod)
      while pidof mongod > /dev/null; do
        sleep 1
      done
      exec mongod --replSet cfgRS --bind_ip_all --configsvr --port 27017 --auth --setParameter enableLocalhostAuthBypass=0 --keyFile /etc/mongo-keyfile
      "
    networks:
      - nest-cluster

  config-sv-assistant:
    container_name: ${APP_NAME}_config-sv-assistant
    image: mongo:7
    ports:
      - "27019:27017"
    volumes:
      - ./keyfile:/etc
      - ./init/init-config-sv/init-config-sv-assistant.js:/init/init.js:ro
      - ./data/config-sv/config-sv-assistant:/data/db
    command: |
      bash -c "
      until [ -f /etc/mongo-keyfile ]; do
        echo 'Waiting for mongo-keyfile...'
        sleep 1
      done
      mongod --replSet cfgRS --bind_ip_all --configsvr --port 27017 --fork --logpath /tmp/mongod.log
      echo 'Waiting for MongoDB startup...'
      while ! mongosh --quiet --host config-sv-assistant:27017 --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 1
      done
      echo 'MongoDB is ready'
      mongosh --host config-sv-assistant:27017 /init/init.js
      until mongosh --quiet 'mongodb://${MONGO_ADMIN_CONFIG_SV}:${MONGO_PASSWORD_CONFIG_SV}@config-sv-primary:27017/admin' --eval 'rs.status().ok' | grep 1 > /dev/null; do
        sleep 40
      done
      kill -15 $(pidof mongod)
      while pidof mongod > /dev/null; do
        sleep 1
      done
      exec mongod --replSet cfgRS --bind_ip_all --configsvr --port 27017 --auth --setParameter enableLocalhostAuthBypass=0 --keyFile /etc/mongo-keyfile
      "
    networks:
      - nest-cluster

  config-sv-secretary:
    container_name: ${APP_NAME}_config-sv-secretary
    image: mongo:7
    ports:
      - "27020:27017"
    volumes:
      - ./keyfile:/etc
      - ./init/init-config-sv/init-config-sv-secretary.js:/init/init.js:ro
      - ./data/config-sv/config-sv-secretary:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ADMIN_CONFIG_SV}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD_CONFIG_SV}
    command: |
      bash -c "
      until [ -f /etc/mongo-keyfile ]; do
