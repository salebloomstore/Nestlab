version: "3.9"

networks:
  nest-cluster:
    external: true

services:

  # =========================
  # NUXT APP
  # =========================
  nuxt-app:
    container_name: nuxt-app

    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    environment:
      PORT: 4000

    expose:
      - "4000"

    networks:
      - nest-cluster

  # =========================
  # NGINX
  # =========================
  nginx:
    container_name: nginx

    image: nginx:alpine

    restart: unless-stopped

    ports:
      - "90:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - nuxt-app

    networks:
      - nest-cluster
