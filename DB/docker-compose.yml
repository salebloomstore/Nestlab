      while pidof mongod > /dev/null; do
        sleep 1
      done
      exec mongod --replSet hnRS --bind_ip_all --port 27017 --shardsvr --auth --setParameter enableLocalhostAuthBypass=0 --keyFile /etc/mongo-keyfile
