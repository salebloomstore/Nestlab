    command: >
      bash -c '
      mongod
      --replSet dnRS
      --bind_ip_all
      --port 27017
      --fork
      --logpath /tmp/mongod.log &&

      until mongosh --host shard-dn-assistant:27017 --eval "db.adminCommand({ ping: 1 })" >/dev/null 2>&1
      do
        echo "waiting shard-dn-assistant..."
        sleep 2
      done &&

      kill -15 $(pidof mongod) &&
      while pidof mongod >/dev/null
      do
        echo "waiting mongod stop..."
        sleep 2
      done &&

      exec mongod
      --replSet dnRS
      --bind_ip_all
      --port 27017
      --shardsvr
      --auth
      --setParameter enableLocalhostAuthBypass=0
      --keyFile /etc/mongo-keyfile
      '
    networks:
      - nest-cluster
    depends_on:
      keygen:
        condition: service_completed_successfully

  shard-dn-secretary:
    container_name: ${APP_NAME}_shard-dn-secretary
    image: mongo:7
    ports: ["27023:27017"]
    volumes:
      - ./keyfile:/etc
    command: >
      bash -c '
      mongod
      --replSet dnRS
      --bind_ip_all
      --port 27017
      --fork
      --logpath /tmp/mongod.log &&

      until mongosh --host shard-dn-secretary:27017 --eval "db.adminCommand({ ping: 1 })" >/dev/null 2>&1
      do
        echo "waiting shard-dn-secretary..."
        sleep 2
      done &&

      kill -15 $(pidof mongod) &&
      while pidof mongod >/dev/null
      do
        echo "waiting mongod stop..."
        sleep 2
      done &&

      exec mongod
      --replSet dnRS
      --bind_ip_all
      --shardsvr
      --port 27017
      --auth
      --setParameter enableLocalhostAuthBypass=0
      --keyFile /etc/mongo-keyfile
      '
    networks:
      - nest-cluster
    depends_on:
      keygen:
        condition: service_completed_successfully

# =========================
# MONGOS ROUTER
# =========================
  mongo-router:
    container_name: ${APP_NAME}_mongo-router
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - ./keyfile:/etc
      - ./mongo/cluster.js:/mongo/cluster.js:ro
    command: >
      bash -c '
      until mongosh --host config-sv-primary:27017 --eval "db.adminCommand({ ping: 1 })" >/dev/null 2>&1
      do
        echo "waiting cfgRS..."
        sleep 2
      done &&

      until mongosh --host shard-dn-primary:27017 --eval "db.adminCommand({ ping: 1 })" >/dev/null 2>&1
      do
        echo "waiting dnRS..."
        sleep 2
      done &&

      until mongosh --host shard-hn-primary:27017 --eval "db.adminCommand({ ping: 1 })" >/dev/null 2>&1
      do
        echo "waiting hnRS..."
        sleep 2
      done &&

      until mongosh --host shard-sg-primary:27017 --eval "db.adminCommand({ ping: 1 })" >/dev/null 2>&1
      do
        echo "waiting sgRS..."
        sleep 2
      done &&

      mongos
      --configdb cfgRS/config-sv-primary:27017,config-sv-assistant:27017,config-sv-secretary:27017
      --bind_ip_all
      --keyFile /etc/mongo-keyfile
      --fork
      --logpath /tmp/mongos.log &&

      until mongosh --host mongo-router:27017 --eval "db.adminCommand({ ping: 1 })" >/dev/null 2>&1
      do
        echo "waiting mongo..."
        sleep 2
      done &&

      mongosh --host mongo-router:27017 -u ${MONGO_ADMIN_CONFIG_SV} -p ${MONGO_PASSWORD_CONFIG_SV} --authenticationDatabase admin /mongo/cluster.js &&

      tail -f /tmp/mongos.log
      '
    networks:
      - nest-cluster

# =========================
# MONGO EXPRESS
# =========================
  mongo-express:
    container_name: ${APP_NAME}_mongo-express
    image: mongo-express
    depends_on:
      - mongo-router
    env_file:
      - .env
    ports:
      - "8081:8081"
    restart: always
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${EXPRESS_ADMIN}:${EXPRESS_PASSWORD}@mongo-router:27017/admin?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: ${EXPRESS_ADMIN}
      ME_CONFIG_BASICAUTH_PASSWORD: ${EXPRESS_PASSWORD}
    command: >
      bash -c '
      until mongosh --host mongo-router:27017 \
      -u ${MONGO_ADMIN_CONFIG_SV} \
      -p ${MONGO_PASSWORD_CONFIG_SV} \
      --authenticationDatabase admin \
      --eval "db.adminCommand({ ping: 1 })" >/dev/null 2>&1
      do
        echo "waiting router..."
        sleep 2
      done

      /sbin/tini -- node app
      '
    networks:
      - nest-cluster
