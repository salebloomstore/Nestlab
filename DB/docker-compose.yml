      --fork
      --logpath /tmp/mongod.log &&

      sleep 55 &&

      mongosh --host config-sv-assistant:27017 /init/init.js &&

      kill -15 $(pidof mongod) &&
      sleep 30 &&

      exec mongod
      --replSet cfgRS
      --bind_ip_all
      --configsvr
