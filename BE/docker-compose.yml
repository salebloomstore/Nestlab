version: "3.9"

services:
  app:
    build: .
    container_name: ${APP_NAME}_BE
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://${MONGO_ADMIN}:${MONGO_PASSWORD}@mongo:27017/nestdb?authSource=admin
    volumes:
      - ./app:/var/www/app

  nginx:
    image: nginx:alpine
    container_name: ${APP_NAME}_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mongo:
    image: mongo:6
    container_name: ${APP_NAME}_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ADMIN}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: ${APP_NAME}_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ADMIN}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin

      ME_CONFIG_BASICAUTH_USERNAME: ${EXPRESS_ADMIN}
      ME_CONFIG_BASICAUTH_PASSWORD: ${EXPRESS_PASSWORD}
    depends_on:
      - mongo

volumes:
  mongo_data:
