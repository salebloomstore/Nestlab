        sleep 1
      done
      echo 'MongoDB is ready'
      mongosh --host config-sv-secretary:27017 /init/init.js
      until mongosh --quiet 'mongodb://${MONGO_ADMIN_CONFIG_SV}:${MONGO_PASSWORD_CONFIG_SV}@config-sv-primary:27017/admin' --eval 'rs.status().ok' | grep 1 > /dev/null; do
        sleep 40
      done
      kill -15 $(pidof mongod)
      while pidof mongod > /dev/null; do
        sleep 1
      done
      exec mongod --replSet cfgRS --bind_ip_all --configsvr --port 27017 --auth --setParameter enableLocalhostAuthBypass=0 --keyFile /etc/mongo-keyfile
