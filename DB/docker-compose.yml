version: "3.9"

networks:
  mongo-cluster:
    driver: bridge

services:

# =========================
# KEYFILE GENERATOR
# =========================
  keygen:
    container_name: ${APP_NAME}_keygen
    image: mongo:7
    volumes:
      - ./keyfile:/keyfile
      - ./init/keygen:/keygen
    entrypoint: ["bash", "/keygen/create-keyfile.sh"]

# =========================
# CONFIG SERVERS (3 nodes)
# =========================
  config-sv-primary:
    container_name: ${APP_NAME}_config-sv-primary
    image: mongo:7
    ports: ["27018:27017"]
    volumes:
      - ./keyfile:/etc
      - ./init/init-config-sv/init-config-sv-primary.js:/init/init.js:ro
    command: >
      bash -c "
      sleep 5 &&

      mongod
      --replSet cfgRS
      --bind_ip_all
      --configsvr
      --port 27017
      --fork
      --logpath /tmp/mongod.log &&

      sleep 20 &&

      mongosh --host config-sv-primary:27017 /init/init.js &&

      kill -15 $(pidof mongod) &&
      sleep 30 &&

      exec mongod
      --replSet cfgRS
      --bind_ip_all
      --configsvr
      --port 27017
      --auth
      --setParameter enableLocalhostAuthBypass=0
      --keyFile /etc/mongo-keyfile
      "

    networks:
      - mongo-cluster

  config-sv-assistant:
    container_name: ${APP_NAME}_config-sv-assistant
    image: mongo:7
    ports: ["27019:27017"]
    volumes:
      - ./keyfile:/etc
      - ./init/init-config-sv/init-config-sv-assistant.js:/init/init.js:ro
