# =====================================================
# DOCKER COMPOSE - NUXT SSR + NGINX FRONTEND
# =====================================================

version: "3.9"


networks:
  nest-cluster:
    external: true


services:


# =====================================================
# NUXT SSR APPLICATION
# =====================================================
  nuxt-app:
    container_name: ${APP_NAME}_GUI

    build:
      context: .
      dockerfile: Dockerfile

    environment:
      HOST: 0.0.0.0
      PORT: 4000
      NODE_ENV: production

    volumes:
      - ./app:/app

    expose:
      - "4000"

    networks:
      - nest-cluster


# =====================================================
# NGINX REVERSE PROXY
# =====================================================
  nginx:
    container_name: ${APP_NAME}_nginx_fGUI

    image: nginx:alpine

    depends_on:
      - nuxt-app

    ports:
      - "90:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    networks:
      - nest-cluster
