version: "3.9"

networks:
  nest-cluster:
    driver: bridge

services:

# =========================
# KEYFILE GENERATOR
# =========================
  keygen:
    container_name: ${APP_NAME}_keygen
    image: mongo:7
    volumes:
      - ./keyfile:/keyfile
      - ./init/keygen:/keygen
    entrypoint: ["bash", "/keygen/create-keyfile.sh"]

# =========================
# CONFIG SERVERS (3 nodes)
# =========================
  config-sv-primary:
    container_name: ${APP_NAME}_config-sv-primary
    image: mongo:7
    ports: ["27018:27017"]
    volumes:
      - ./keyfile:/etc
      - ./init/init-config-sv/init-config-sv-primary.js:/init/init.js:ro
    env_file:
      - .env
    command: >
      bash -c '
      mongod
      --replSet cfgRS
      --bind_ip_all
      --configsvr
      --port 27017
      --fork
      --logpath /tmp/mongod.log &&

      until mongosh --host config-sv-primary:27017 --eval "db.adminCommand({ ping: 1 })" >/dev/null 2>&1
      do
        echo "waiting mongo..."
        sleep 2
      done &&

      mongosh --host config-sv-primary:27017 /init/init.js &&

      kill -15 $(pidof mongod) &&
      while pidof mongod >/dev/null
      do
        echo "waiting mongod stop..."
        sleep 2
      done &&

      exec mongod
      --replSet cfgRS
      --bind_ip_all
      --configsvr
      --port 27017
      --auth
      --setParameter enableLocalhostAuthBypass=0
      --keyFile /etc/mongo-keyfile
      '
    networks:
      - nest-cluster
    depends_on:
      keygen:
        condition: service_completed_successfully

  config-sv-assistant:
    container_name: ${APP_NAME}_config-sv-assistant
    image: mongo:7
    ports: ["27019:27017"]
    volumes:
      - ./keyfile:/etc
      - ./init/init-config-sv/init-config-sv-assistant.js:/init/init.js:ro
    command: >
      bash -c '
      mongod
      --replSet cfgRS
      --bind_ip_all
      --configsvr
      --port 27017
      --fork
      --logpath /tmp/mongod.log &&

      until mongosh --host config-sv-assistant:27017 --eval "db.adminCommand({ ping: 1 })" >/dev/null 2>&1
      do
        echo "waiting config-sv-assistant..."
        sleep 2
      done &&

      mongosh --host config-sv-assistant:27017 /init/init.js &&

      kill -15 $(pidof mongod) &&
      while pidof mongod >/dev/null
      do
        echo "waiting mongod stop..."
        sleep 2
      done &&

      exec mongod
      --replSet cfgRS
      --bind_ip_all
      --configsvr
      --port 27017
      --auth
      --setParameter enableLocalhostAuthBypass=0
      --keyFile /etc/mongo-keyfile
      '
    networks:
      - nest-cluster
    depends_on:
      keygen:
        condition: service_completed_successfully

  config-sv-secretary:
    container_name: ${APP_NAME}_config-sv-secretary
    image: mongo:7
    ports: ["27020:27017"]
    volumes:
      - ./keyfile:/etc
      - ./init/init-config-sv/init-config-sv-secretary.js:/init/init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ADMIN_CONFIG_SV}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD_CONFIG_SV}
    command: >
      bash -c '
      mongod
      --replSet cfgRS
      --bind_ip_all
      --configsvr
      --port 27017
      --fork
      --logpath /tmp/mongod.log &&

      until mongosh --host config-sv-secretary:27017 --eval "db.adminCommand({ ping: 1 })" >/dev/null 2>&1
      do
        echo "waiting config-sv-secretary..."
        sleep 2
      done &&

      mongosh --host config-sv-secretary:27017 /init/init.js &&

      kill -15 $(pidof mongod) &&
      while pidof mongod >/dev/null
      do
        echo "waiting mongod stop..."
        sleep 2
      done &&

      exec mongod
      --replSet cfgRS
      --bind_ip_all
      --configsvr
      --port 27017
      --auth
      --setParameter enableLocalhostAuthBypass=0
      --keyFile /etc/mongo-keyfile
      '
    networks:
      - nest-cluster
    depends_on:
      keygen:
        condition: service_completed_successfully

