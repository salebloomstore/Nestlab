# =====================================================
# DOCKER COMPOSE - NESTJS + NGINX FRONT API
# =====================================================
# Stack Overview:
# - NestJS API
# - Nginx reverse proxy
# =====================================================

name: nestjs-master

x-nginx-image: &nginx-image nginx:1.31.1@sha256:5aca99593157f4ae539a5dec1092a0ad8762f8e2eb1789085a13a0f5622369f6

networks:
  master-netwrk:
    external: true

services:
  # =====================================================
  # NESTJS BACKEND APPLICATION
  # =====================================================
  nestjs-webapi-io:
    build: .
    container_name: ${APP_NAME}_nestjs-webapi-io
    restart: always
    ports:
      - ${NESTJS_WEBAPI_IO_PORT}:${PORT_OF_NESTJS}
    working_dir: /var/www/app
    volumes:
      # Source code bind mount (dev-friendly)
      - ./source:/var/www/app
    env_file: .env
    networks:
      - master-netwrk

  # =====================================================
  # NGINX REVERSE PROXY
  # =====================================================
  nginxe-server-be:
    image: *nginx-image
    container_name: ${APP_NAME}_nginxe-server-be
    restart: always
    ports:
      - ${NGINXE_SERVER_BE_PORT}:${PORT_OF_NGINXE}
    volumes:
      # Nginx configuration
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template
    env_file: .env
    depends_on:
      - nestjs-webapi-io
    networks:
      - master-netwrk
