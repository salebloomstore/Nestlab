        sleep 2
      done

      echo '✅ SHARD SG REPLICATED'

      echo '🎉 ALL REPLICA SETS REPLICATED'

      echo '⏳ Waiting for ALL NODES RESTART WITH AUTH...'

      until mongosh --quiet 'mongodb://${MONGO_ADMIN_CONFIG_SV}:${MONGO_PASSWORD_CONFIG_SV}@config-sv-primary:27017/admin?authSource=admin' --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 2
      done

      until mongosh --quiet 'mongodb://${MONGO_ADMIN_CONFIG_SV}:${MONGO_PASSWORD_CONFIG_SV}@config-sv-assistant:27017/admin?authSource=admin' --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 2
      done

      until mongosh --quiet 'mongodb://${MONGO_ADMIN_CONFIG_SV}:${MONGO_PASSWORD_CONFIG_SV}@config-sv-secretary:27017/admin?authSource=admin' --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 2
      done

      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_DN}:${MONGO_PASSWORD_SHARD_DN}@shard-dn-primary:27017/admin?authSource=admin' --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 2
      done

      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_DN}:${MONGO_PASSWORD_SHARD_DN}@shard-dn-assistant:27017/admin?authSource=admin' --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 2
      done

      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_DN}:${MONGO_PASSWORD_SHARD_DN}@shard-dn-secretary:27017/admin?authSource=admin' --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 2
      done

      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_HN}:${MONGO_PASSWORD_SHARD_HN}@shard-hn-primary:27017/admin?authSource=admin' --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 2
      done

      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_HN}:${MONGO_PASSWORD_SHARD_HN}@shard-hn-assistant:27017/admin?authSource=admin' --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 2
      done

      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_HN}:${MONGO_PASSWORD_SHARD_HN}@shard-hn-secretary:27017/admin?authSource=admin' --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 2
      done

      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_SG}:${MONGO_PASSWORD_SHARD_SG}@shard-sg-primary:27017/admin?authSource=admin' --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 2
      done

      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_SG}:${MONGO_PASSWORD_SHARD_SG}@shard-sg-assistant:27017/admin?authSource=admin' --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 2
      done

      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_SG}:${MONGO_PASSWORD_SHARD_SG}@shard-sg-secretary:27017/admin?authSource=admin' --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 2
      done

      echo '✅ ALL NODES RESTARTED WITH AUTH'

      echo '🚀 STARTING MONGOS...'

      mongos --configdb cfgRS/config-sv-primary:27017,config-sv-assistant:27017,config-sv-secretary:27017 --bind_ip_all --keyFile /etc/mongo-keyfile --fork --logpath /tmp/mongos.log

      echo '⏳ Waiting for mongos startup...'

      until pidof mongos > /dev/null; do
        sleep 2
      done

      until mongosh --quiet 'mongodb://${MONGO_ADMIN_CONFIG_SV}:${MONGO_PASSWORD_CONFIG_SV}@localhost:27017/admin?authSource=admin' --eval 'db.runCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
        sleep 2
      done

      echo '✅ MONGOS READY'

      echo '⏳ Configuring cluster...'

      mongosh --host mongo-router --port 27017 -u ${MONGO_ADMIN_CONFIG_SV} -p ${MONGO_PASSWORD_CONFIG_SV} --authenticationDatabase admin /mongo/cluster.js && tail -f /tmp/mongos.log

      echo '✅ CLUSTER CONFIGURED'
      "
    networks:
      - nest-cluster

  # =========================
  # MONGO EXPRESS
  # =========================
  mongo-express:
    container_name: ${APP_NAME}_mongo-express
    image: mongo-express
    depends_on:
      - mongo-router
    env_file:
      - .env
    ports:
      - "8081:8081"
    restart: always
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ADMIN_CONFIG_SV}:${MONGO_PASSWORD_CONFIG_SV}@mongo-router:27017/admin?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: ${EXPRESS_ADMIN}
      ME_CONFIG_BASICAUTH_PASSWORD: ${EXPRESS_PASSWORD}
    command: |
      bash -c "
      echo 'Waiting for mongos startup...'
      until nc -z mongo-router 27017; do
        sleep 2
      done
      echo 'mongos is ready'
      /sbin/tini -- node app
      "
    networks:
      - nest-cluster
