  mongo-router:
    container_name: ${APP_NAME}_mongo-router
    image: mongo:7
    env_file:
      - .env
    ports:
      - "27017:27017"
    volumes:
      - ./keyfile:/etc
      - ./mongo/cluster.js:/mongo/cluster.js:ro
    command: |
      bash -c "
      echo '⏳ Waiting for CONFIG SERVER REPLICATION...'

      until mongosh --quiet 'mongodb://${MONGO_ADMIN_CONFIG_SV}:${MONGO_PASSWORD_CONFIG_SV}@config-sv-primary:27017/admin?replicaSet=cfgRS&authSource=admin' --eval 'rs.status().members.filter(m => m.stateStr == \"SECONDARY\").length' | grep 2 > /dev/null; do
        sleep 2
      done

      echo '✅ CONFIG SERVER REPLICATED'

      echo '⏳ Waiting for SHARD DN REPLICATION...'

      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_DN}:${MONGO_PASSWORD_SHARD_DN}@shard-dn-primary:27017/admin?replicaSet=dnRS&authSource=admin' --eval 'rs.status().members.filter(m => m.stateStr == \"SECONDARY\").length' | grep 2 > /dev/null; do
        sleep 2
      done

      echo '✅ SHARD DN REPLICATED'

      echo '⏳ Waiting for SHARD HN REPLICATION...'

      until mongosh --quiet 'mongodb://${MONGO_ADMIN_SHARD_HN}:${MONGO_PASSWORD_SHARD_HN}@shard-hn-primary:27017/admin?replicaSet=hnRS&authSource=admin' --eval 'rs.status().members.filter(m => m.stateStr == \"SECONDARY\").length' | grep 2 > /dev/null; do
        sleep 2
      done

      echo '✅ SHARD HN REPLICATED'

      echo '⏳ Waiting for SHARD SG REPLICATION...'

