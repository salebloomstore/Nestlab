# =========================
# MONGOS ROUTER
# =========================
  mongo-router:
    container_name: ${APP_NAME}_mongo-router
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - ./keyfile:/etc
      - ./mongo/cluster.js:/mongo/cluster.js:ro
    command: >
      bash -c "
      sleep 140 &&

      mongos
      --configdb cfgRS/config-sv-primary:27017,config-sv-assistant:27017,config-sv-secretary:27017
      --bind_ip_all
      --keyFile /etc/mongo-keyfile
      --fork
      --logpath /tmp/mongos.log &&

      sleep 20 &&

      mongosh --host mongo-router:27017 -u admin -p password --authenticationDatabase admin /mongo/cluster.js &&

      tail -f /tmp/mongos.log
      "
    networks:
      - mongo-cluster
# =========================
# MONGO EXPRESS
# =========================
  mongo-express:
    container_name: ${APP_NAME}_mongo-express
    image: mongo-express
    depends_on:
      - mongo-router
    ports:
      - "8081:8081"
    restart: always
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongo-router:27017/admin?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    command: >
      bash -c "
      sleep 160 &&
      /sbin/tini -- node app
      "
    networks:
      - mongo-cluster
