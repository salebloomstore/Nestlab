      until mongosh --quiet 'mongodb://${MONGO_ADMIN_CONFIG_SV}:${MONGO_PASSWORD_CONFIG_SV}@config-sv-primary:27017/admin?authSource=admin' --eval 'rs.isMaster().ismaster' | grep true > /dev/null; do
        sleep 3
